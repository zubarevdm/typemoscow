backend:  name: git-gateway  branch: mainmedia_folder: "assets/uploads"public_folder: "/assets/uploads"collections:  - name: "services"    label: "Услуги и цены"    files:      - name: "services"        label: "Все услуги"        file: "content/services.json"        format: json        fields:          - label: "Основные услуги"            name: "basic"            widget: "list"            fields:              - { label: "Название", name: "name", widget: "string" }              - { label: "Цена", name: "price", widget: "string", hint: "Например: 3 000 ₽" }          - label: "Дополнительные услуги"            name: "additional"            widget: "list"            fields:              - { label: "Название", name: "name", widget: "string" }              - { label: "Цена", name: "price", widget: "string", hint: "Например: 1 500 ₽" }          - label: "Комплексы"            name: "packages"            widget: "list"            fields:              - { label: "Название", name: "name", widget: "string" }              - { label: "Цена", name: "price", widget: "string" }              - { label: "Описание", name: "note", widget: "string" }  - name: "team"    label: "Команда"    files:      - name: "team"        label: "Мастера"        file: "content/team.json"        format: json        fields:          - label: "Мастера"            name: "masters"            widget: "list"            fields:              - { label: "Имя", name: "name", widget: "string" }              - { label: "Инициалы (2 буквы для аватара)", name: "initials", widget: "string", hint: "Например: ШЮ" }              - { label: "Роль", name: "role", widget: "string", default: "Мастер" }              - { label: "Биография", name: "bio", widget: "text" }              - { label: "Теги", name: "tags", widget: "list", hint: "Добавьте теги — опыт, специализация и т.д." }              - { label: "Фото", name: "photo", widget: "image", required: false, allow_multiple: false }  - name: "contacts"    label: "Контакты"    files:      - name: "contacts"        label: "Контактная информация"        file: "content/contacts.json"        format: json        fields:          - { label: "Телефон", name: "phone", widget: "string", hint: "Например: +7 965 31 31 31 5" }          - { label: "Email", name: "email", widget: "string" }          - { label: "Адрес", name: "address", widget: "string", hint: "Например: г. Москва, ул. Остоженка 47" }          - { label: "Метро / подсказка", name: "metro", widget: "string" }          - { label: "Часы работы", name: "hours", widget: "string", hint: "Например: с 10 до 22 часов" }          - { label: "Подпись к часам", name: "hours_note", widget: "string", hint: "Например: Без выходных" }          - { label: "Instagram (ссылка)", name: "instagram", widget: "string" }          - { label: "Telegram (ссылка)", name: "telegram", widget: "string" }          - { label: "VK (ссылка)", name: "vk", widget: "string" }          - { label: "Ссылка YClients (запись)", name: "yclients", widget: "string" }